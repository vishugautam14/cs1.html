<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Brew Haven Cafe</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

:root{
--brown:#4b2e2e;
--cream:#f7f3ef;
--gold:#c8a97e;
--beige:#efe6dc;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins;
}

html{
scroll-behavior:smooth;
}

body{
background:var(--cream);
color:#333;
transition:.4s;
}

.dark{
background:#111;
color:white;
}

nav{
position:sticky;
top:0;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 50px;
background:rgba(75,46,46,.95);
backdrop-filter:blur(10px);
z-index:999;
}

nav h2{
color:white;
}

nav ul{
display:flex;
list-style:none;
gap:25px;
}

nav a{
color:white;
text-decoration:none;
font-weight:500;
}

nav button{
padding:8px 15px;
border:none;
background:var(--gold);
color:white;
cursor:pointer;
border-radius:6px;
}

.hero{
height:100vh;
background:url("https://images.unsplash.com/photo-1509042239860-f550ce710b93") center/cover;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
color:white;
perspective:1000px;
}

.hero h1{
font-size:60px;
margin-bottom:20px;
animation:float 3s ease-in-out infinite;
}

@keyframes float{
0%{transform:translateY(0px)}
50%{transform:translateY(-15px)}
100%{transform:translateY(0px)}
}

.btn{
padding:14px 30px;
margin:10px;
border:none;
background:var(--gold);
color:white;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

section{
padding:80px 10%;
}

.section-title{
text-align:center;
font-size:36px;
margin-bottom:40px;
}

.about{
background:var(--beige);
line-height:1.7;
}

.menu-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
}

.menu-card{
background:white;
border-radius:20px;
padding:20px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,.1);
transition:.3s;
transform-style:preserve-3d;
perspective:1000px;
}
